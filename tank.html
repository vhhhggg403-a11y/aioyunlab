<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Kaçış</title>
    <style>
        /* Temel Sıfırlama ve Tam Ekran Ayarları */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d1a;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none; /* Mobilde kaydırmayı engelle */
        }

        /* Canvas Ayarı */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Arayüz Katmanı (UI) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Tıklamaların canvas'a geçmesi için */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Tıklanabilir UI Elemanları */
        .interactive {
            pointer-events: auto;
        }

        /* Modern Cam Efekti (Glassmorphism) Paneller */
        .panel {
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 200, 0.2);
            transition: all 0.3s ease;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.8);
        }

        p {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .highlight {
            color: #00ffc8;
            font-weight: bold;
        }
        
        .powerup-text {
            color: #ff00ea;
            font-weight: bold;
        }

        /* Modern Buton Tasarımı */
        button {
            background: linear-gradient(45deg, #00ffc8, #0088ff);
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 200, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 200, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Oyun İçi HUD (Skor, Seviye, Butonlar) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .stats {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .stats span {
            display: block;
            font-size: 1rem;
            color: #00ffc8;
            margin-top: 5px;
        }

        /* Üst Sağ Kontroller (Duraklat, Ses) */
        .controls {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            color: white;
            padding: 0;
            margin: 0;
            box-shadow: none;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* Ekranların Görünürlük Yönetimi */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">
            
            <div id="hud" class="interactive hidden">
                <div class="stats">
                    Skor: <span id="scoreEl" style="display:inline; color:white; font-size:1.5rem;">0</span>
                    <span id="levelEl">Seviye: 1</span>
                </div>
                <div class="controls">
                    <button id="soundBtn" class="icon-btn">🔊</button>
                    <button id="pauseBtn" class="icon-btn">⏸</button>
                </div>
            </div>

            <div id="startScreen" class="panel interactive">
                <h1>Neon Kaçış</h1>
                <p>Kırmızı düşmanlardan kaç, <span class="highlight">yeşil skorları</span> topla. <span class="powerup-text">Mor küreler</span> kalkan sağlar!</p>
                <p style="font-size: 0.9rem;">(Hareket etmek için fareyi sürükle veya ekrana dokun)</p>
                <button id="startBtn">Oyuna Başla</button>
            </div>

            <div id="gameOverScreen" class="panel interactive hidden">
                <h1 style="color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.8);">Oyun Bitti</h1>
                <p>Skorunuz: <span id="finalScore" class="highlight" style="font-size: 1.5rem;">0</span></p>
                <p>En Yüksek Skor: <span id="highScoreEl" class="highlight">0</span></p>
                <button id="restartBtn">Yeniden Oyna</button>
            </div>

            <div id="pauseScreen" class="panel interactive hidden">
                <h1>Duraklatıldı</h1>
                <p>Oyun şu an bekliyor.</p>
                <button id="resumeBtn">Devam Et</button>
            </div>

        </div>
    </div>

    <script>
        // --- TEMEL KURULUM VE DEĞİŞKENLER ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elemanları Seçimi
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const pauseScreen = document.getElementById('pauseScreen');
        const hud = document.getElementById('hud');
        const scoreEl = document.getElementById('scoreEl');
        const levelEl = document.getElementById('levelEl');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScoreEl');
        
        // Butonlar
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        const soundBtn = document.getElementById('soundBtn');

        // Ekran Boyutlarını Ayarlama (Responsive)
        let cw, ch;
        function resize() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Oyun Durumu Değişkenleri
        let gameState = 'start'; // start, playing, paused, gameover
        let score = 0;
        let level = 1;
        let frameCount = 0;
        let animationId;
        
        // Zorluk ve Ayarlar
        let baseEnemySpawnRate = 60; // Düşük = daha hızlı doğma
        let currentSpawnRate = baseEnemySpawnRate;
        let difficultyMultiplier = 1;

        // Nesne Dizileri
        let enemies = [];
        let particles = [];
        let collectibles = [];
        let powerUps = [];

        // Fare/Dokunma Takibi
        const mouse = {
            x: cw / 2,
            y: ch / 2,
            isActive: false
        };

        // LocalStorage'dan En Yüksek Skoru Çekme
        let highScore = 0;
        try {
            highScore = localStorage.getItem('neonHighScore') || 0;
        } catch(e) { console.log("LocalStorage desteklenmiyor."); }

        // --- SES SİSTEMİ (Web Audio API) ---
        let audioCtx;
        let isMuted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (isMuted || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'collect':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'powerup':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.linearRampToValueAtTime(800, now + 0.1);
                    osc.frequency.linearRampToValueAtTime(1200, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'hit':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'levelUp':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(554, now + 0.1);
                    osc.frequency.setValueAtTime(659, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                    break;
            }
        }

        // --- GİRDİ YÖNETİMİ ---
        function updateMousePos(e) {
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            mouse.x = clientX;
            mouse.y = clientY;
            mouse.isActive = true;
        }

        window.addEventListener('mousemove', updateMousePos);
        window.addEventListener('touchmove', (e) => {
            if(gameState === 'playing') e.preventDefault(); // Sadece oyun oynanırken kaydırmayı engelle
            updateMousePos(e);
        }, { passive: false });
        
        window.addEventListener('touchstart', updateMousePos, { passive: false });

        // --- SINIFLAR (NESNELER) ---

        // Oyuncu Sınıfı
        class Player {
            constructor() {
                this.x = cw / 2;
                this.y = ch / 2;
                this.radius = 15;
                this.color = '#fff';
                this.glow = '#00ffc8';
                this.speed = 0.15; // Fareyi takip hızı (Yumuşak hareket)
                this.hasShield = false;
                this.shieldTimer = 0;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                // Kalkan (Güçlendirme) Görseli
                if (this.hasShield) {
                    ctx.fillStyle = '#ff00ea';
                    ctx.shadowColor = '#ff00ea';
                    ctx.shadowBlur = 30;
                    
                    // Kalkan çemberi
                    ctx.strokeStyle = 'rgba(255, 0, 234, 0.5)';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.glow;
                    ctx.shadowBlur = 20;
                }
                
                ctx.fill();
                ctx.closePath();
                ctx.restore();
            }

            update() {
                // Fare/Dokunma pozisyonuna yumuşak geçiş
                if (mouse.isActive) {
                    this.x += (mouse.x - this.x) * this.speed;
                    this.y += (mouse.y - this.y) * this.speed;
                }

                // Ekran sınırları
                this.x = Math.max(this.radius, Math.min(cw - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(ch - this.radius, this.y));

                // Kalkan Süresi Kontrolü
                if (this.hasShield) {
                    this.shieldTimer--;
                    if (this.shieldTimer <= 0) {
                        this.hasShield = false;
                    }
                }

                this.draw();
            }
        }

        // Düşman Sınıfı
        class Enemy {
            constructor() {
                this.radius = Math.random() * 10 + 10;
                // Ekran dışından başlat
                if (Math.random() < 0.5) {
                    this.x = Math.random() < 0.5 ? 0 - this.radius : cw + this.radius;
                    this.y = Math.random() * ch;
                } else {
                    this.x = Math.random() * cw;
                    this.y = Math.random() < 0.5 ? 0 - this.radius : ch + this.radius;
                }
                
                this.color = '#ff3366';
                
                // Oyuncuya doğru açı hesapla
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                // Zorluğa göre hız belirle
                const speed = (Math.random() * 2 + 1) * difficultyMultiplier;
                
                this.velocity = {
                    x: Math.cos(angle) * speed,
                    y: Math.sin(angle) * speed
                };
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.closePath();
                ctx.restore();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.draw();
            }
        }

        // Toplanabilir Puan Objesi
        class Collectible {
            constructor() {
                this.x = Math.random() * (cw - 40) + 20;
                this.y = -20;
                this.radius = 8;
                this.color = '#00ffc8';
                this.velocity = {
                    y: (Math.random() * 2 + 1) * difficultyMultiplier
                };
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                // Elmas şekli çizimi
                ctx.translate(this.x, this.y);
                ctx.rotate(frameCount * 0.05);
                ctx.rect(-this.radius, -this.radius, this.radius * 2, this.radius * 2);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.closePath();
                ctx.restore();
            }

            update() {
                this.y += this.velocity.y;
                this.draw();
            }
        }

        // Güçlendirme Objesi (Kalkan)
        class PowerUp {
            constructor() {
                this.x = Math.random() * (cw - 40) + 20;
                this.y = -20;
                this.radius = 12;
                this.color = '#ff00ea';
                this.velocity = {
                    y: 1.5 * difficultyMultiplier
                };
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                ctx.fill();
                
                // İçine bir ikon (küçük beyaz daire)
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius/2, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();

                ctx.closePath();
                ctx.restore();
            }

            update() {
                this.y += this.velocity.y;
                this.draw();
            }
        }

        // Parçacık Efektleri Sınıfı
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 3 + 1;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.velocity = {
                    x: Math.cos(angle) * speed,
                    y: Math.sin(angle) * speed
                };
                this.alpha = 1;
                this.friction = 0.95;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.02;
                this.draw();
            }
        }

        // --- TEMEL FONKSİYONLAR ---

        let player;

        // Oyunu Başlat / Sıfırla
        function initGame() {
            player = new Player();
            enemies = [];
            collectibles = [];
            powerUps = [];
            particles = [];
            score = 0;
            level = 1;
            frameCount = 0;
            difficultyMultiplier = 1;
            currentSpawnRate = baseEnemySpawnRate;
            
            updateHUD();
            initAudio();
        }

        // Çarpışma Kontrolü (Daireler arası)
        function checkCollision(obj1, obj2) {
            const dist = Math.hypot(obj1.x - obj2.x, obj1.y - obj2.y);
            return dist - obj1.radius - obj2.radius < 0;
        }

        // Parçacık Patlaması Oluştur
        function createExplosion(x, y, color, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // UI Güncelleme
        function updateHUD() {
            scoreEl.innerText = score;
            levelEl.innerText = `Seviye: ${level}`;
        }

        // Oyun Bittiğinde Çalışacak
        function gameOver() {
            gameState = 'gameover';
            playSound('hit');
            
            // Yüksek Skor Kontrolü ve Kaydı
            if (score > highScore) {
                highScore = score;
                try {
                    localStorage.setItem('neonHighScore', highScore);
                } catch(e) {}
            }
            
            finalScoreEl.innerText = score;
            highScoreEl.innerText = highScore;
            
            hud.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
        }

        // --- ANA OYUN DÖNGÜSÜ (GAME LOOP) ---
        function animate() {
            if (gameState !== 'playing') return;
            animationId = requestAnimationFrame(animate);
            frameCount++;

            // Arka planı hafif saydam temizle (İz bırakma/Trail efekti)
            ctx.fillStyle = 'rgba(13, 13, 26, 0.2)';
            ctx.fillRect(0, 0, cw, ch);

            // Oyuncuyu Güncelle
            player.update();

            // Düşman Doğurma Mantığı
            if (frameCount % currentSpawnRate === 0) {
                enemies.push(new Enemy());
            }

            // Puan Objesi Doğurma
            if (frameCount % 100 === 0) {
                collectibles.push(new Collectible());
            }

            // Güçlendirme Doğurma (Nadir)
            if (frameCount % 600 === 0 && Math.random() > 0.3) {
                powerUps.push(new PowerUp());
            }

            // Parçacıkları Güncelle ve Temizle
            for (let i = particles.length - 1; i >= 0; i--) {
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    particles[i].update();
                }
            }

            // Toplanabilirleri Güncelle ve Çarpışma Kontrolü
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const c = collectibles[i];
                c.update();

                // Ekrandan çıktıysa sil
                if (c.y > ch + c.radius) {
                    collectibles.splice(i, 1);
                    continue;
                }

                // Oyuncu ile çarpıştıysa
                if (checkCollision(player, c)) {
                    score += 10;
                    playSound('collect');
                    createExplosion(c.x, c.y, c.color, 10);
                    collectibles.splice(i, 1);

                    // Seviye Atlama Kontrolü
                    if (score % 100 === 0) {
                        level++;
                        difficultyMultiplier += 0.2;
                        if(currentSpawnRate > 20) currentSpawnRate -= 5;
                        playSound('levelUp');
                        createExplosion(player.x, player.y, '#ffffff', 30);
                    }
                    updateHUD();
                }
            }

            // Güçlendirmeleri Güncelle
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i];
                p.update();

                if (p.y > ch + p.radius) {
                    powerUps.splice(i, 1);
                    continue;
                }

                if (checkCollision(player, p)) {
                    playSound('powerup');
                    createExplosion(p.x, p.y, p.color, 20);
                    player.hasShield = true;
                    player.shieldTimer = 300; // 300 frame (yaklaşık 5 saniye) kalkan
                    powerUps.splice(i, 1);
                }
            }

            // Düşmanları Güncelle ve Çarpışma Kontrolü
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.update();

                // Ekrandan çok uzaklaştıysa sil (Optimizasyon)
                if (e.x < -100 || e.x > cw + 100 || e.y < -100 || e.y > ch + 100) {
                    enemies.splice(i, 1);
                    continue;
                }

                // Oyuncu ile Çarpışma
                if (checkCollision(player, e)) {
                    if (player.hasShield) {
                        // Kalkan varsa düşmanı yok et ve puan ver
                        createExplosion(e.x, e.y, e.color, 15);
                        score += 5;
                        updateHUD();
                        playSound('hit');
                        enemies.splice(i, 1);
                    } else {
                        // Kalkan yoksa oyunu bitir
                        createExplosion(player.x, player.y, player.color, 40);
                        gameOver();
                    }
                }
            }
        }

        // --- BUTON VE ARAYÜZ OLAYLARI ---

        startBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            hud.style.opacity = 1;
            initGame();
            gameState = 'playing';
            animate();
        });

        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            initGame();
            gameState = 'playing';
            animate();
        });

        pauseBtn.addEventListener('click', () => {
            if (gameState === 'playing') {
                gameState = 'paused';
                cancelAnimationFrame(animationId);
                pauseScreen.classList.remove('hidden');
            }
        });

        resumeBtn.addEventListener('click', () => {
            if (gameState === 'paused') {
                pauseScreen.classList.add('hidden');
                gameState = 'playing';
                animate();
            }
        });

        soundBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            if (isMuted) {
                soundBtn.innerText = '🔇';
                soundBtn.style.color = '#ff3366';
            } else {
                soundBtn.innerText = '🔊';
                soundBtn.style.color = 'white';
                initAudio();
            }
        });

        // Klavye Kısayolları
        window.addEventListener('keydown', (e) => {
            // 'P' veya 'Escape' tuşu ile duraklatma/devam ettirme
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                if (gameState === 'playing') {
                    pauseBtn.click();
                } else if (gameState === 'paused') {
                    resumeBtn.click();
                }
            }
        });

    </script>
</body>
</html>
