<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hungry Abyss</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;user-select:none}
canvas{display:block;cursor:crosshair}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const WW=7000,WH=6000,SL=1400;

// ── KÖPEK BALIĞI TÜRLERİ ────────────────────────────────────────────────────
const SHARKS=[
  {id:0,name:"Siyah Uçlu Resif", color:"#607D8B",top:"#37474F",sz:26,spd:5.5,hp:100, price:0,    desc:"Ücretsiz başlangıç. Çevik ve hızlı.",    speed:5,bite:3,boost:4},
  {id:1,name:"Mako",             color:"#1E88E5",top:"#0D47A1",sz:24,spd:7.5,hp:90,  price:1000, desc:"Okyanusun en hızlı mermisi.",              speed:9,bite:5,boost:7},
  {id:2,name:"Çekiç Baş",       color:"#A1887F",top:"#5D4037",sz:32,spd:5.0,hp:140, price:3000, desc:"360° görüş, elektromanyetik algı.",        speed:5,bite:6,boost:4},
  {id:3,name:"Kaplan",          color:"#4E5D6C",top:"#2B3E50",sz:38,spd:4.4,hp:190, price:7500, desc:"Ölümcül çeneler, kaplan şeritleri.",       speed:4,bite:8,boost:5},
  {id:4,name:"Büyük Beyaz",     color:"#CFD8DC",top:"#546E7A",sz:50,spd:3.8,hp:260, price:15000,desc:"Derinliklerin gerçek efendisi.",            speed:4,bite:9,boost:4},
  {id:5,name:"Orca",            color:"#455A64",top:"#1C2833",sz:48,spd:5.8,hp:230, price:25000,desc:"Zeki memeli avcı, sürü taktikleri.",       speed:6,bite:8,boost:6},
  {id:6,name:"Mosasaurus",      color:"#2E7D32",top:"#1B5E20",sz:58,spd:4.5,hp:320, price:40000,desc:"Kretase süper yırtıcısı. 4 kürek.",        speed:5,bite:10,boost:5},
  {id:7,name:"ZILLA SHARK",     color:"#37474F",top:"#212F3D",sz:65,spd:4.0,hp:600, price:60000,desc:"V=Atomik Nefes. Karada Godzilla olur!",    speed:4,bite:10,boost:8}
];

const LCFG={
  reaper:      {segs:30,spd:3.5,sz:50,turn:0.035,gap:22,dmg:1.4,gold:3000},
  plesiosaur:  {segs:22,spd:2.8,sz:40,turn:0.030,gap:28,dmg:1.0,gold:2000},
  kronosaurus: {segs:16,spd:4.2,sz:62,turn:0.045,gap:20,dmg:2.2,gold:4500},
  dunkleosteus:{segs:14,spd:3.0,sz:52,turn:0.028,gap:24,dmg:1.8,gold:3800},
  giant_squid: {segs:20,spd:2.6,sz:46,turn:0.055,gap:16,dmg:1.2,gold:2500}
};

// ── DURUM ───────────────────────────────────────────────────────────────────
let state='MENU',gold=parseInt(localStorage.getItem('ha_gold'))||0;
let lastClaim=parseInt(localStorage.getItem('ha_claim'))||0;
let cam={x:0,y:0},mouse={x:0,y:0};
let menuIdx=0,menuHA={};  // menuHA = hit areas
let player=null,fish=[],levs=[],keys={};
let bubbles=[];

// ── SU BALONCUKLARI ─────────────────────────────────────────────────────────
function initBubbles(){
  bubbles=[];
  for(let i=0;i<140;i++) bubbles.push({
    x:Math.random()*WW, y:SL+Math.random()*(WH-SL-100),
    r:Math.random()*5+1.5, spd:Math.random()*1.8+0.4,
    wob:Math.random()*Math.PI*2, ws:Math.random()*0.025+0.008
  });
}
initBubbles();

// ── EVENT LİSTENERS ─────────────────────────────────────────────────────────
function resizeCv(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCv); resizeCv();
window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='v'&&state==='PLAYING'&&player.id===7&&player.aCool<=0){
    player.aFire=true;player.aTimer=45;player.aCool=120;
  }
});
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

window.addEventListener('click',e=>{
  const mx=e.clientX,my=e.clientY;
  if(state==='MENU'){
    // Günlük ödül
    let d=menuHA.daily;
    if(d&&mx>=d.x&&mx<=d.x+d.w&&my>=d.y&&my<=d.y+d.h){
      if(Date.now()-lastClaim>=86400000){gold+=2500;lastClaim=Date.now();save();alert('🎁 +2500 Altın!');}
      return;
    }
    // Sol ok
    let la=menuHA.left;
    if(la&&mx>=la.x&&mx<=la.x+la.w&&my>=la.y&&my<=la.y+la.h){
      menuIdx=(menuIdx-1+SHARKS.length)%SHARKS.length; return;
    }
    // Sağ ok
    let ra=menuHA.right;
    if(ra&&mx>=ra.x&&mx<=ra.x+ra.w&&my>=ra.y&&my<=ra.y+ra.h){
      menuIdx=(menuIdx+1)%SHARKS.length; return;
    }
    // Oyna/Satın Al butonu
    let pb=menuHA.play;
    if(pb&&mx>=pb.x&&mx<=pb.x+pb.w&&my>=pb.y&&my<=pb.y+pb.h){
      let sh=SHARKS[menuIdx],unlocked=getUnlocked();
      if(unlocked.includes(sh.id)){initGame(sh);}
      else if(gold>=sh.price){gold-=sh.price;unlocked.push(sh.id);saveUnlocked(unlocked);save();initGame(sh);}
      return;
    }
  } else if(state==='GAMEOVER') state='MENU';
});

// ── YARDIMCILAR ─────────────────────────────────────────────────────────────
function save(){localStorage.setItem('ha_gold',gold);localStorage.setItem('ha_claim',lastClaim);}
function getUnlocked(){return JSON.parse(localStorage.getItem('ha_unlocked')||'[0]');}
function saveUnlocked(a){localStorage.setItem('ha_unlocked',JSON.stringify(a));}

function spawnLev(type){
  let c=LCFG[type],segs=[];
  let lx=Math.random()*WW,ly=SL+800+Math.random()*(WH-SL-1500);
  for(let i=0;i<c.segs;i++) segs.push({x:lx,y:ly});
  levs.push({type,segs,spd:c.spd,ang:Math.random()*Math.PI*2,tAng:0,sz:c.sz,turn:c.turn,gap:c.gap,dmg:c.dmg,gold:c.gold});
}

function initGame(sh){
  player={...sh,x:WW/2,y:SL+200,ang:0,health:sh.hp,aFire:false,aTimer:0,aCool:0,walk:false};
  fish=[]; levs=[];
  for(let s=0;s<35;s++){
    let gx=Math.random()*WW,gy=SL+Math.random()*(WH-SL-200),gc=`hsl(${Math.random()*50+180},90%,60%)`;
    for(let i=0;i<Math.floor(Math.random()*8)+6;i++)
      fish.push({x:gx+(Math.random()*100-50),y:gy+(Math.random()*100-50),t:'small',sz:Math.random()*4+7,c:gc,spd:Math.random()*1.2+1.8,ang:Math.random()*Math.PI*2});
  }
  for(let i=0;i<40;i++) spawnFish('big');
  for(let i=0;i<20;i++) spawnFish('turtle');
  ['reaper','plesiosaur','kronosaurus','dunkleosteus','giant_squid','reaper','plesiosaur','kronosaurus','dunkleosteus','giant_squid']
    .forEach(t=>spawnLev(t));
  state='PLAYING';
}

function spawnFish(t){
  fish.push({x:Math.random()*WW,y:SL+100+Math.random()*(WH-SL-300),t,
    sz:t==='turtle'?24:Math.random()*8+18,
    c:t==='turtle'?'#2E7D32':`hsl(${Math.random()*40+15},85%,50%)`,
    spd:t==='turtle'?0.8:Math.random()*0.8+1.2,ang:Math.random()*Math.PI*2});
}

// ── GÜNCELLEME ───────────────────────────────────────────────────────────────
function update(){
  if(state!=='PLAYING') return;
  player.health-=0.05;
  if(player.health<=0){save();state='GAMEOVER';return;}
  if(player.aCool>0) player.aCool--;

  // Baloncuklar
  bubbles.forEach(b=>{
    b.y-=b.spd; b.x+=Math.sin(b.wob)*0.4; b.wob+=b.ws;
    if(b.y<SL-20){b.y=WH-80+Math.random()*100;b.x=Math.random()*WW;}
  });

  let onLand=(player.x>=1800&&player.x<=5200),gnd=SL-40;
  if(player.id===7&&onLand&&player.y<=SL+50){
    player.walk=true; player.y=gnd-20;
    player.ang=(mouse.x+cam.x>player.x)?0:Math.PI;
    let dx=(mouse.x+cam.x)-player.x;
    if(Math.abs(dx)>15) player.x+=Math.sign(dx)*player.spd*0.8;
  } else {
    player.walk=false;
    let tx=mouse.x+cam.x,ty=mouse.y+cam.y,dx=tx-player.x,dy=ty-player.y,d=Math.hypot(dx,dy);
    if(d>15){
      player.ang=Math.atan2(dy,dx);
      if(player.y<SL&&player.id!==7) player.y+=5;
      else{player.x+=Math.cos(player.ang)*player.spd;player.y+=Math.sin(player.ang)*player.spd;}
    }
  }
  player.x=Math.max(0,Math.min(WW,player.x));
  player.y=Math.max(100,Math.min(WH,player.y));
  cam.x=player.x-canvas.width/2; cam.y=player.y-canvas.height/2;

  if(player.aFire){
    player.aTimer--;
    if(player.aTimer<=0) player.aFire=false;
    let bx=player.x+Math.cos(player.ang)*player.sz;
    let by=player.y+Math.sin(player.ang)*(player.walk?-40:0);
    for(let li=levs.length-1;li>=0;li--){
      let lv=levs[li],hd=lv.segs[0],hit=false;
      for(let d=0;d<900&&!hit;d+=35){
        let cx=bx+Math.cos(player.ang)*d,cy=by+Math.sin(player.ang)*d;
        if(Math.hypot(hd.x-cx,hd.y-cy)<lv.sz+30){
          gold+=lv.gold;player.health=Math.min(player.hp,player.health+100);
          levs.splice(li,1);
          let types=Object.keys(LCFG);
          setTimeout(()=>spawnLev(types[Math.floor(Math.random()*types.length)]),6000);
          hit=true;
        }
      }
    }
  }

  for(let i=fish.length-1;i>=0;i--){
    let f=fish[i];
    f.ang+=(Math.random()*0.16-0.08);
    f.x+=Math.cos(f.ang)*f.spd; f.y+=Math.sin(f.ang)*f.spd;
    if(f.x<0||f.x>WW||f.y<SL||f.y>WH) f.ang+=Math.PI;
    if(Math.hypot(player.x-f.x,player.y-f.y)<player.sz+f.sz*0.5){
      let r=f.t==='small'?3:f.t==='turtle'?40:15;
      gold+=r;player.health=Math.min(player.hp,player.health+r*2);
      fish.splice(i,1);
      if(f.t==='small') fish.push({x:Math.random()*WW,y:SL+Math.random()*(WH-SL),t:'small',sz:Math.random()*4+7,c:f.c,spd:2,ang:0});
      else spawnFish(f.t);
    }
  }

  levs.forEach(lv=>{
    let hd=lv.segs[0],dp=Math.hypot(player.x-hd.x,player.y-hd.y);
    if(dp<1200&&player.y>SL) lv.tAng=Math.atan2(player.y-hd.y,player.x-hd.x);
    else lv.tAng+=(Math.random()*0.1-0.05);
    let diff=Math.atan2(Math.sin(lv.tAng-lv.ang),Math.cos(lv.tAng-lv.ang));
    lv.ang+=Math.min(lv.turn,Math.max(-lv.turn,diff));
    hd.x+=Math.cos(lv.ang)*lv.spd; hd.y+=Math.sin(lv.ang)*lv.spd;
    for(let i=1;i<lv.segs.length;i++){
      let p=lv.segs[i-1],c=lv.segs[i],sd=Math.hypot(p.x-c.x,p.y-c.y);
      if(sd>lv.gap){c.x+=(p.x-c.x)*(sd-lv.gap)/sd;c.y+=(p.y-c.y)*(sd-lv.gap)/sd;}
    }
    if(dp<lv.sz*0.8+player.sz) player.health-=lv.dmg;
  });
}

// ═══════════════════════════════════════════════════════════════
//  KÖPEK BALIĞI ÇİZİMLERİ
// ═══════════════════════════════════════════════════════════════
function drawShark(x,y,sz,ang,color,top,type,isP,id){
  if(id===undefined) id=-1;
  ctx.save(); ctx.translate(x,y); ctx.rotate(ang);

  // ZILLA GODZILLA YÜRÜYÜŞÜ
  if(isP&&player&&player.id===7&&player.walk){
    ctx.rotate(-ang);
    if(mouse.x+cam.x<player.x) ctx.scale(-1,1);
    _godzilla(ctx,sz,color,top,player.aFire);
    ctx.restore(); return;
  }

  const s=sz;
  if(type==='turtle'){
    ctx.fillStyle='#1E5631';ctx.beginPath();ctx.ellipse(0,0,s,s*0.8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#A9DFBF';ctx.beginPath();ctx.arc(s*0.9,0,s*0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1E5631';
    ctx.beginPath();ctx.ellipse(s*0.3,-s*0.7,s*0.3,s*0.6,Math.PI/4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(s*0.3,s*0.7,s*0.3,s*0.6,-Math.PI/4,0,Math.PI*2);ctx.fill();
  } else if(type==='small'||type==='big'){
    let fg=ctx.createLinearGradient(0,-s*0.4,0,s*0.4);
    fg.addColorStop(0,top);fg.addColorStop(0.55,color);fg.addColorStop(1,'#E5E7E9');
    ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(0,0,s,s*0.44,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.2;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(s*0.2+i*4,-s*0.14);ctx.lineTo(s*0.2+i*4,s*0.14);ctx.stroke();}
    ctx.fillStyle=top;
    ctx.beginPath();ctx.moveTo(-s,0);ctx.lineTo(-s*1.3,-s*0.5);ctx.lineTo(-s*1.1,0);ctx.lineTo(-s*1.3,s*0.5);ctx.fill();
  } else {
    if(id===5) _orca(ctx,s);
    else if(id===6) _mosa(ctx,s,color,top);
    else if(id===7) _zillaSwim(ctx,s,color,top,isP&&player&&player.aFire);
    else if(id===2) _hammer(ctx,s,color,top);
    else _std(ctx,s,id,color,top);
  }
  ctx.restore();
}

// ─── STANDART (0=Blacktip,1=Mako,3=Kaplan,4=BüyükBeyaz) ────────────────────
function _std(ctx,s,id,color,top){
  const isBT=id===0,isMk=id===1,isTg=id===3,isGW=id===4;
  const bH=isMk?s*0.37:isGW?s*0.52:s*0.44;
  const snX=isMk?s*1.06:s*0.96;
  let g=ctx.createLinearGradient(0,-bH*1.3,0,bH*1.3);
  g.addColorStop(0,top);g.addColorStop(0.38,color);
  g.addColorStop(0.82,isGW?'#D6E0E8':'#B2C0CC');g.addColorStop(1,'#FFF');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(snX,0);
  ctx.bezierCurveTo(snX*0.84,-bH*0.68,s*0.38,-bH,s*0.04,-bH);
  ctx.bezierCurveTo(-s*0.32,-bH,-s*0.76,-bH*0.62,-s*0.9,-bH*0.17);
  ctx.lineTo(-s*0.93,0);
  ctx.bezierCurveTo(-s*0.76,bH*0.55,-s*0.32,bH*0.84,s*0.04,bH*0.84);
  ctx.bezierCurveTo(s*0.38,bH*0.84,snX*0.84,bH*0.55,snX,0);ctx.fill();
  if(isGW||isMk){
    let bg=ctx.createLinearGradient(0,0,0,bH);
    bg.addColorStop(0,'rgba(255,255,255,0)');bg.addColorStop(0.45,'rgba(245,248,252,0.6)');bg.addColorStop(1,'rgba(255,255,255,0.92)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(s*0.1,bH*0.5,s*0.64,bH*0.4,0,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle=top;
  ctx.beginPath();ctx.moveTo(-s*0.88,bH*0.1);ctx.bezierCurveTo(-s*1.0,s*0.18,-s*1.18,s*0.33,-s*1.15,s*0.12);ctx.bezierCurveTo(-s*1.05,0,-s*0.95,0,-s*0.88,bH*0.1);ctx.fill();
  ctx.beginPath();ctx.moveTo(-s*0.85,-bH*0.12);ctx.bezierCurveTo(-s*1.0,-s*0.22,-s*1.36,-s*0.54,-s*1.31,-s*0.12);ctx.bezierCurveTo(-s*1.15,s*0.01,-s*0.95,0,-s*0.85,-bH*0.12);ctx.fill();
  ctx.beginPath();ctx.moveTo(s*0.1,-bH*0.9);ctx.bezierCurveTo(s*0.02,-bH*2.05,-s*0.22,-bH*2.2,-s*0.39,-bH*0.95);ctx.bezierCurveTo(-s*0.18,-bH*0.88,s*0.05,-bH*0.88,s*0.1,-bH*0.9);ctx.fill();
  ctx.beginPath();ctx.moveTo(-s*0.34,-bH*0.7);ctx.lineTo(-s*0.5,-bH*1.12);ctx.lineTo(-s*0.62,-bH*0.74);ctx.fill();
  ctx.fillStyle=color;ctx.globalAlpha=0.82;
  ctx.beginPath();ctx.moveTo(s*0.26,bH*0.42);ctx.bezierCurveTo(s*0.08,bH*1.55,-s*0.2,bH*1.72,-s*0.34,bH*0.94);ctx.bezierCurveTo(-s*0.14,bH*0.62,s*0.1,bH*0.5,s*0.26,bH*0.42);ctx.fill();
  ctx.globalAlpha=1;ctx.fillStyle=top;
  ctx.beginPath();ctx.moveTo(-s*0.26,bH*0.68);ctx.lineTo(-s*0.42,bH*1.12);ctx.lineTo(-s*0.53,bH*0.76);ctx.fill();
  if(isBT){
    ctx.fillStyle='#0D0D0D';
    ctx.beginPath();ctx.ellipse(-s*0.26,-bH*2.07,s*0.1,s*0.14,-0.15,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(-s*0.28,bH*1.62,s*0.1,s*0.13,0.25,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(-s*1.29,-s*0.27,s*0.09,s*0.11,0.4,0,Math.PI*2);ctx.fill();
  }
  if(isMk){
    ctx.save();let ms=ctx.createLinearGradient(-s*0.2,-bH,s*0.5,bH*0.3);
    ms.addColorStop(0,'rgba(100,181,246,0.38)');ms.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=ms;ctx.beginPath();ctx.ellipse(s*0.2,-bH*0.2,s*0.5,bH*0.55,-0.2,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  if(isTg){
    ctx.save();ctx.globalAlpha=0.18;ctx.strokeStyle='#111';ctx.lineWidth=s*0.1;ctx.lineCap='round';
    for(let i=0;i<5;i++){let tx=s*(0.38-i*0.23);ctx.beginPath();ctx.moveTo(tx,-bH*0.76);ctx.bezierCurveTo(tx+s*0.04,-bH*0.22,tx+s*0.04,bH*0.18,tx,bH*0.66);ctx.stroke();}
    ctx.restore();
  }
  ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=1.2;
  for(let i=0;i<5;i++){let gx=s*0.42-i*s*0.065;ctx.beginPath();ctx.moveTo(gx,-bH*0.33);ctx.quadraticCurveTo(gx+s*0.016,-bH*0.02,gx,bH*0.26);ctx.stroke();}
  let eX=s*0.67,eY=-bH*0.19;
  ctx.fillStyle='#0D1117';ctx.beginPath();ctx.arc(eX,eY,s*0.11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(40,80,130,0.55)';ctx.beginPath();ctx.arc(eX,eY,s*0.07,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0D1117';ctx.beginPath();ctx.arc(eX,eY,s*0.04,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.78)';ctx.beginPath();ctx.arc(eX+s*0.032,eY-s*0.032,s*0.028,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(30,10,10,0.35)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(snX,bH*0.07);ctx.quadraticCurveTo(s*0.72,bH*0.32,s*0.52,bH*0.17);ctx.stroke();
  ctx.fillStyle='#F0F0F0';
  for(let t=0;t<3;t++){let tx=snX-s*0.07-t*s*0.1;ctx.beginPath();ctx.moveTo(tx,bH*0.07);ctx.lineTo(tx-s*0.025,bH*0.2);ctx.lineTo(tx+s*0.025,bH*0.2);ctx.fill();}
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(s*0.5,-bH*0.05);ctx.bezierCurveTo(s*0.1,-bH*0.06,-s*0.4,-bH*0.06,-s*0.86,-bH*0.02);ctx.stroke();
}

// ─── ÇEKİÇ BAŞ ──────────────────────────────────────────────────────────────
function _hammer(ctx,s,color,top){
  const bH=s*0.45;
  let g=ctx.createLinearGradient(0,-bH*1.2,0,bH*1.2);
  g.addColorStop(0,top);g.addColorStop(0.45,color);g.addColorStop(1,'#B8C9D0');ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(s*0.64,0);ctx.bezierCurveTo(s*0.54,-bH,s*0.04,-bH,-s*0.16,-bH);

function _godzilla(ctx,s,color,top,fire){

  // SAG ARKA BACAK (arka)
  let bRS=Math.sin(T)*s*0.14;
  ctx.strokeStyle='#16142A';ctx.lineWidth=s*0.24;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-s*0.38,gY-bH*0.08);ctx.bezierCurveTo(-s*0.32+bRS*0.4,gY-bH*0.52,-s*0.28+bRS*0.55,gY-bH*0.26,-s*0.34+bRS*0.45,gY);ctx.stroke();
  ctx.strokeStyle='#C0BCE6';ctx.lineWidth=s*0.062;
  for(let k=0;k<3;k++){ctx.beginPath();ctx.moveTo(-s*0.34+bRS*0.45,gY);ctx.lineTo(-s*0.34+bRS*0.45+s*(0.13-k*0.035),gY+s*0.12);ctx.stroke();}
  // SAG ON BACAK (arka)
  let fRS=Math.sin(T+Math.PI)*s*0.14;
  ctx.strokeStyle='#16142A';ctx.lineWidth=s*0.24;
  ctx.beginPath();ctx.moveTo(s*0.38,gY-bH*0.08);ctx.bezierCurveTo(s*0.44+fRS*0.4,gY-bH*0.54,s*0.5+fRS*0.55,gY-bH*0.28,s*0.44+fRS*0.45,gY);ctx.stroke();
  ctx.strokeStyle='#C0BCE6';ctx.lineWidth=s*0.062;
  for(let k=0;k<3;k++){ctx.beginPath();ctx.moveTo(s*0.44+fRS*0.45,gY);ctx.lineTo(s*0.44+fRS*0.45+s*(0.13-k*0.035),gY+s*0.12);ctx.stroke();}
  // GOVDE
  let bg=ctx.createLinearGradient(0,gY-bH*1.06,0,gY);
  bg.addColorStop(0,'#16142A');bg.addColorStop(0.26,'#28234C');bg.addColorStop(0.56,'#342E66');bg.addColorStop(0.8,'#6460A0');bg.addColorStop(1,'#8884B0');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(s*0.8,gY-bH*0.15);
  ctx.bezierCurveTo(s*0.64,gY-bH*1.06,s*0.12,gY-bH*1.12,-s*0.2,gY-bH*1.1);
  ctx.bezierCurveTo(-s*0.56,gY-bH*1.05,-s*0.84,gY-bH*0.62,-s*0.84,gY-bH*0.3);
  ctx.bezierCurveTo(-s*0.84,gY-bH*0.02,-s*0.56,gY,-s*0.2,gY);
  ctx.bezierCurveTo(s*0.12,gY,s*0.6,gY-bH*0.02,s*0.8,gY-bH*0.15);ctx.fill();
  // Karin
  let bl=ctx.createLinearGradient(0,gY-bH*0.2,0,gY);
  bl.addColorStop(0,'rgba(176,168,220,0)');bl.addColorStop(1,'rgba(196,192,240,0.32)');

  if(fire){ctx.shadowBlur=22;ctx.shadowColor='#00E5FF';}

  ctx.shadowBlur=0;ctx.restore();
  // SOL ARKA BACAK (on)
  let bLS=Math.sin(T+Math.PI)*s*0.14;
  ctx.strokeStyle='#28234C';ctx.lineWidth=s*0.26;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-s*0.34,gY-bH*0.08);ctx.bezierCurveTo(-s*0.28-bLS*0.4,gY-bH*0.52,-s*0.22-bLS*0.55,gY-bH*0.26,-s*0.28-bLS*0.45,gY);ctx.stroke();

  // SOL ON BACAK (on)
  let fLS=Math.sin(T)*s*0.14;
  ctx.strokeStyle='#28234C';ctx.lineWidth=s*0.26;
  ctx.beginPath();ctx.moveTo(s*0.42,gY-bH*0.08);ctx.bezierCurveTo(s*0.48-fLS*0.4,gY-bH*0.54,s*0.54-fLS*0.55,gY-bH*0.28,s*0.48-fLS*0.45,gY);ctx.stroke();

  for(let k=0;k<3;k++){ctx.beginPath();ctx.moveTo(s*0.48-fLS*0.45,gY);ctx.lineTo(s*0.48-fLS*0.45+s*(0.14-k*0.04),gY+s*0.13);ctx.stroke();}
  // SIRT DIKENLERI
  let spBY=gY-bH*1.06;
  for(let i=0;i<6;i++){
    let spX=s*(0.46-i*0.2),spH=bH*(0.44+(i>=1&&i<=4?0.62:0.14)),spW=s*(0.054+(i>=2&&i<=3?0.02:0));
    if(fire){ctx.shadowBlur=18;ctx.shadowColor='#00E5FF';ctx.fillStyle='rgba(0,229,255,'+(0.4+i*0.1)+')';}

    ctx.beginPath();ctx.moveTo(spX-spW,spBY);ctx.lineTo(spX-spW*0.28,spBY-spH);ctx.lineTo(spX+spW*0.28,spBY-spH);ctx.lineTo(spX+spW,spBY);ctx.fill();
    ctx.shadowBlur=0;
  }
  // KAFA
  let hcx=s*0.74,hcy=gY-bH*0.4;
  let hg=ctx.createLinearGradient(hcx,hcy-bH*0.5,hcx,hcy+bH*0.3);
  hg.addColorStop(0,'#16142A');hg.addColorStop(0.44,'#28234C');hg.addColorStop(1,'#7878B0');
  ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(hcx,hcy,s*0.44,bH*0.39,-0.1,0,Math.PI*2);ctx.fill();
  // Ust cene
  ctx.fillStyle='#16142A';
  ctx.beginPath();ctx.moveTo(hcx+s*0.3,hcy-bH*0.1);ctx.bezierCurveTo(hcx+s*0.6,hcy-bH*0.09,hcx+s*0.82,hcy-bH*0.04,hcx+s*0.86,hcy+bH*0.04);ctx.bezierCurveTo(hcx+s*0.82,hcy+bH*0.12,hcx+s*0.6,hcy+bH*0.1,hcx+s*0.3,hcy+bH*0.1);ctx.fill();
  // Agiz
  ctx.fillStyle='#040210';ctx.beginPath();ctx.moveTo(hcx+s*0.3,hcy+bH*0.09);ctx.lineTo(hcx+s*0.86,hcy+bH*0.04);ctx.lineTo(hcx+s*0.86,hcy+bH*0.24);ctx.bezierCurveTo(hcx+s*0.66,hcy+bH*0.42,hcx+s*0.4,hcy+bH*0.38,hcx+s*0.3,hcy+bH*0.26);ctx.fill();

  // Disler
  let tc=fire?'#00E5FF':'#BCDEFF';
  if(fire){ctx.shadowBlur=8;ctx.shadowColor='#00E5FF';}
  ctx.fillStyle=tc;
  for(let t=0;t<4;t++){let tx=hcx+s*(0.36+t*0.1);ctx.beginPath();ctx.moveTo(tx,hcy+bH*0.1);ctx.lineTo(tx+s*0.032,hcy+bH*0.22);ctx.lineTo(tx+s*0.064,hcy+bH*0.1);ctx.fill();}

  // Delikler

function drawLev(lv){
  const segs=lv.segs,n=segs.length;
  segs.forEach((seg,i)=>{
    let sx=seg.x-cam.x,sy=seg.y-cam.y;
    if(sx<-300||sx>canvas.width+300||sy<-300||sy>canvas.height+300) return;
    let csz=lv.sz*(1-(i/n)*0.58);
    let ang=lv.ang;
    if(i<n-1) ang=Math.atan2(segs[i].y-segs[i+1].y,segs[i].x-segs[i+1].x);
    ctx.save();ctx.translate(sx,sy);ctx.rotate(ang);
    if(lv.type==='reaper')       _reaperSeg(ctx,i,n,csz);
    else if(lv.type==='plesiosaur') _plesioSeg(ctx,i,n,csz);
    else if(lv.type==='kronosaurus') _kronoSeg(ctx,i,n,csz);
    else if(lv.type==='dunkleosteus') _dunkleSeg(ctx,i,n,csz);
    else if(lv.type==='giant_squid') _squidSeg(ctx,i,n,csz);
    ctx.restore();
  });
}

function _reaperSeg(ctx,i,n,sz){
  if(i===0){
    ctx.fillStyle='#7B1010';ctx.beginPath();ctx.ellipse(sz*0.35,0,sz*1.45,sz*0.88,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4A0000';
    ctx.beginPath();ctx.moveTo(sz*1.6,-sz*0.1);ctx.bezierCurveTo(sz*2.2,-sz*0.38,sz*2.7,-sz*0.55,sz*2.35,-sz*0.15);ctx.bezierCurveTo(sz*2.0,sz*0.05,sz*1.75,sz*0.02,sz*1.6,-sz*0.1);ctx.fill();
    ctx.beginPath();ctx.moveTo(sz*1.6,sz*0.1);ctx.bezierCurveTo(sz*2.2,sz*0.38,sz*2.7,sz*0.55,sz*2.35,sz*0.15);ctx.bezierCurveTo(sz*2.0,-sz*0.05,sz*1.75,-sz*0.02,sz*1.6,sz*0.1);ctx.fill();
    ctx.fillStyle='#FFFDE0';
    for(let t=0;t<5;t++){ctx.beginPath();ctx.moveTo(sz*(1.65+t*0.12),-sz*0.05);ctx.lineTo(sz*(1.7+t*0.12),-sz*0.32);ctx.lineTo(sz*(1.75+t*0.12),-sz*0.05);ctx.fill();}
    ctx.shadowBlur=14;ctx.shadowColor='#00E5FF';ctx.fillStyle='#00E5FF';
    ctx.beginPath();ctx.arc(sz*0.88,-sz*0.38,sz*0.22,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sz*0.88,sz*0.38,sz*0.22,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#002244';
    ctx.beginPath();ctx.arc(sz*0.94,-sz*0.38,sz*0.12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sz*0.94,sz*0.38,sz*0.12,0,Math.PI*2);ctx.fill();
  } else {
    let arm=i%3===1;
    ctx.fillStyle=arm?'#6B1111':'#420000';
    ctx.beginPath();ctx.ellipse(0,0,sz*1.55,sz*0.72,0,0,Math.PI*2);ctx.fill();
    if(arm){
      ctx.fillStyle='#3A0000';
      ctx.beginPath();ctx.ellipse(0,-sz*0.52,sz*0.85,sz*0.26,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(0,sz*0.52,sz*0.85,sz*0.26,0,0,Math.PI*2);ctx.fill();
    }
    if(i%4===0&&i>2){
      ctx.shadowBlur=8;ctx.shadowColor='#00BCD4';ctx.fillStyle='rgba(0,200,220,0.72)';
      ctx.beginPath();ctx.arc(sz*0.3,-sz*0.55,sz*0.13,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sz*0.3,sz*0.55,sz*0.13,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    if(i>n-4){
      ctx.fillStyle='#3A0000';
      ctx.beginPath();ctx.moveTo(sz*0.3,-sz*0.72);ctx.lineTo(-sz*0.05,-sz*1.5);ctx.lineTo(-sz*0.38,-sz*0.72);ctx.fill();
      ctx.beginPath();ctx.moveTo(sz*0.3,sz*0.72);ctx.lineTo(-sz*0.05,sz*1.5);ctx.lineTo(-sz*0.38,sz*0.72);ctx.fill();
    }

function _plesioSeg(ctx,i,n,sz){
  if(i===0){

  } else if(i<4){
    ctx.fillStyle='#1B3A4B';ctx.beginPath();ctx.ellipse(0,0,sz*1.65,sz*0.85,0,0,Math.PI*2);ctx.fill();

function _dunkleSeg(ctx,i,n,sz){

    ctx.strokeStyle='#2A1810';ctx.lineWidth=sz*0.04;
    ctx.beginPath();ctx.moveTo(sz*0.6,-sz*0.25);ctx.lineTo(sz*1.8,-sz*0.05);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sz*0.6,sz*0.25);ctx.lineTo(sz*1.8,sz*0.05);ctx.stroke();
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(sz*0.4,-sz*0.58,sz*0.22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sz*0.44,-sz*0.58,sz*0.12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(sz*0.49,-sz*0.63,sz*0.07,0,Math.PI*2);ctx.fill();
  } else if(i<4){
    ctx.fillStyle='#5A4030';ctx.beginPath();ctx.ellipse(0,0,sz*1.7,sz*0.92,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(30,10,5,0.35)';ctx.lineWidth=sz*0.08;
    ctx.beginPath();ctx.moveTo(-sz*0.8,-sz*0.5);ctx.lineTo(sz*0.8,-sz*0.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-sz*0.8,sz*0.5);ctx.lineTo(sz*0.8,sz*0.5);ctx.stroke();
  } else {
    ctx.fillStyle='#503C28';ctx.beginPath();ctx.ellipse(0,0,sz*1.75,sz*0.85,0,0,Math.PI*2);ctx.fill();
    if(i===5){ctx.fillStyle='#3A2010';ctx.beginPath();ctx.moveTo(-sz*0.3,-sz*0.82);ctx.lineTo(sz*0.1,-sz*1.7);ctx.lineTo(sz*0.5,-sz*0.82);ctx.fill();}
    if(i===4){
      ctx.fillStyle='#5A4030';ctx.globalAlpha=0.82;
      ctx.beginPath();ctx.ellipse(0,-sz*0.85,sz*0.45,sz*1.4,Math.PI/4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(0,sz*0.85,sz*0.45,sz*1.4,-Math.PI/4,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    if(i===n-1){
      ctx.fillStyle='#3A2010';
      ctx.beginPath();ctx.moveTo(sz*0.4,-sz*0.62);ctx.lineTo(-sz*0.2,-sz*1.25);ctx.lineTo(-sz*0.5,-sz*0.62);ctx.fill();
      ctx.beginPath();ctx.moveTo(sz*0.4,sz*0.62);ctx.lineTo(-sz*0.2,sz*1.25);ctx.lineTo(-sz*0.5,sz*0.62);ctx.fill();
    }
  }
}

function _squidSeg(ctx,i,n,sz){
  const T=(Date.now()/600)%(Math.PI*2);
  if(i===0){
    ctx.fillStyle='#8B0057';
    ctx.beginPath();ctx.moveTo(-sz*1.2,0);ctx.bezierCurveTo(-sz*0.8,-sz*0.7,sz*0.4,-sz*0.8,sz*1.0,0);ctx.bezierCurveTo(sz*0.4,sz*0.8,-sz*0.8,sz*0.7,-sz*1.2,0);ctx.fill();
    ctx.save();ctx.globalAlpha=0.18;
    let mg=ctx.createRadialGradient(0,0,0,0,0,sz*1.2);
    mg.addColorStop(0,'#FF4FC3');mg.addColorStop(1,'rgba(139,0,87,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(0,0,sz*1.2,0,Math.PI*2);ctx.fill();ctx.restore();
    for(let k=0;k<8;k++){
      let aa=(k/8)*Math.PI*2+T*0.15+Math.sin(T+k*0.7)*0.3;
      let al=sz*(1.2+Math.sin(T+k)*0.2);
      ctx.strokeStyle=k%2===0?'#B00069':'#8B0057';ctx.lineWidth=sz*0.2;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(Math.cos(aa)*sz*0.85,Math.sin(aa)*sz*0.85);
      let ex=Math.cos(aa)*al*1.55,ey=Math.sin(aa)*al*1.55;
      ctx.bezierCurveTo(Math.cos(aa+0.4)*al,Math.sin(aa+0.4)*al,ex-Math.cos(aa)*sz*0.2,ey-Math.sin(aa)*sz*0.2,ex,ey);
      ctx.stroke();
      ctx.fillStyle='rgba(255,150,200,0.6)';ctx.beginPath();ctx.arc(ex,ey,sz*0.12,0,Math.PI*2);ctx.fill();
    }
    for(let k=0;k<2;k++){
      let aa=(k===0?0.1:-0.1)+Math.PI/2+Math.sin(T+k*3)*0.15;
      ctx.strokeStyle='#6A0042';ctx.lineWidth=sz*0.15;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(Math.cos(aa)*sz*0.9,Math.sin(aa)*sz*0.9);
      ctx.bezierCurveTo(Math.cos(aa+0.5)*sz*2.2,Math.sin(aa+0.5)*sz*2.2,Math.cos(aa)*sz*2.8,Math.sin(aa)*sz*2.8,Math.cos(aa-0.3)*sz*3.2,Math.sin(aa-0.3)*sz*3.2);
      ctx.stroke();
    }
    ctx.fillStyle='#FFE0F5';ctx.beginPath();ctx.arc(sz*0.45,-sz*0.45,sz*0.32,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sz*0.45,-sz*0.45,sz*0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(sz*0.52,-sz*0.52,sz*0.1,0,Math.PI*2);ctx.fill();
  } else {
    let p=1-(i/n);
    ctx.fillStyle=`rgba(${Math.round(139+p*20)},0,${Math.round(87+p*30)},${0.7+p*0.3})`;
    ctx.beginPath();ctx.ellipse(0,0,sz*1.7,sz*0.78,0,0,Math.PI*2);ctx.fill();
    if(i===n-1){
      ctx.fillStyle='#6A0042';
      ctx.beginPath();ctx.moveTo(sz*0.4,-sz*0.55);ctx.lineTo(-sz*0.2,-sz*1.2);ctx.lineTo(-sz*0.55,-sz*0.55);ctx.fill();
      ctx.beginPath();ctx.moveTo(sz*0.4,sz*0.55);ctx.lineTo(-sz*0.2,sz*1.2);ctx.lineTo(-sz*0.55,sz*0.55);ctx.fill();
    }
  }
}

//  SU FİZİĞİ
// ═══════════════════════════════════════════════════════════════
function drawBubbles(){
  ctx.save();
  bubbles.forEach(b=>{
    let sx=b.x-cam.x,sy=b.y-cam.y;
    if(sx<-20||sx>canvas.width+20||sy<-20||sy>canvas.height+20) return;
    ctx.globalAlpha=0.38;ctx.strokeStyle='rgba(150,220,255,0.9)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.arc(sx,sy,b.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.1;ctx.fillStyle='rgba(200,240,255,1)';
    ctx.beginPath();ctx.arc(sx,sy,b.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.55;ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.beginPath();ctx.arc(sx-b.r*0.32,sy-b.r*0.32,b.r*0.24,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

function drawLightRays(){
  let sY=SL-cam.y;
  if(sY>canvas.height||sY<-100) return;
  ctx.save();
  let T=Date.now()/2000;
  for(let r=0;r<10;r++){
    let rx=(canvas.width*(r/10)+Math.sin(T+r*0.8)*50)%canvas.width;
    let rw=22+Math.sin(T*1.3+r)*9,rh=480+Math.sin(T*0.7+r*0.5)*100;
    let an=Math.sin(T*0.6+r*0.4)*0.08;
    let gr=ctx.createLinearGradient(rx,sY,rx+Math.sin(an)*rh,sY+rh);
    gr.addColorStop(0,`rgba(100,200,255,${0.055+Math.sin(T+r)*0.018})`);
    gr.addColorStop(1,'rgba(0,30,80,0)');
    ctx.fillStyle=gr;
    ctx.beginPath();
    ctx.moveTo(rx-rw/2,sY);ctx.lineTo(rx+rw/2,sY);
    ctx.lineTo(rx+rw/2+Math.sin(an)*rh,sY+rh);ctx.lineTo(rx-rw/2+Math.sin(an)*rh,sY+rh);
    ctx.fill();
  }
  ctx.restore();
}

function drawWave(){
  let sY=SL-cam.y;
  if(sY<-10||sY>canvas.height+10) return;
  let T=Date.now()/800;
  ctx.save();
  ctx.strokeStyle='rgba(100,180,255,0.55)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,sY);
  for(let x=0;x<=canvas.width;x+=4)
    ctx.lineTo(x,sY+Math.sin(x/80+T)*6+Math.sin(x/35+T*1.5)*3);
  ctx.stroke();
  ctx.fillStyle='rgba(30,90,180,0.1)';
  ctx.beginPath();ctx.moveTo(0,sY);
  for(let x=0;x<=canvas.width;x+=4)
    ctx.lineTo(x,sY+Math.sin(x/80+T)*6+Math.sin(x/35+T*1.5)*3);
  ctx.lineTo(canvas.width,sY+30);ctx.lineTo(0,sY+30);ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  MENÜ — HUNGRY SHARK EVOLUTİON STİLİ CAROUSEL
// ═══════════════════════════════════════════════════════════════
function drawMenu(){
  let W=canvas.width,H=canvas.height,now=Date.now();

  // ── Derin okyanus arka planı ────────────────────────────────
  let bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#000d1a');bg.addColorStop(0.4,'#00173d');bg.addColorStop(0.75,'#001228');bg.addColorStop(1,'#000308');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Caustic halkaları
  ctx.save();ctx.globalAlpha=0.055;
  for(let r=0;r<8;r++){
    let rx=(Math.sin(now/4200+r*1.1)*0.5+0.5)*W;
    let ry=(Math.cos(now/3600+r*0.9)*0.5+0.5)*H*0.55;
    let rg=ctx.createRadialGradient(rx,ry,0,rx,ry,160+r*28);
    rg.addColorStop(0,'rgba(30,160,255,0.9)');rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(rx,ry,160+r*28,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Yükselen baloncuklar
  ctx.save();
  for(let b=0;b<45;b++){
    let seed=b*137.5,cyc=7000+(b%5)*2200;
    let phase=((now+seed*100)%cyc)/cyc;
    let bx=((seed*23.7)%W)+Math.sin(phase*Math.PI*4+seed)*24;
    let by=H*(1-phase),br=1+(b%4)*1.3;
    ctx.globalAlpha=0.1+Math.sin(phase*Math.PI)*0.1;
    ctx.fillStyle='#BFEFFF';ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Arka plan balıkları
  ctx.save();ctx.globalAlpha=0.04;
  for(let fi=0;fi<8;fi++){
    let fx=((now/1400*(0.35+fi*0.1))+fi*600)%W,fy=80+fi*50,fsz=18+fi%3*10;
    ctx.fillStyle='#5BCCFF';ctx.beginPath();ctx.ellipse(fx,fy,fsz,fsz*0.38,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // ── BAŞLIK ─────────────────────────────────────────────────
  ctx.save();
  ctx.shadowBlur=35;ctx.shadowColor='rgba(0,160,255,0.7)';
  ctx.font=`bold ${Math.round(H*0.048)}px Segoe UI`;ctx.textAlign='center';
  let tg=ctx.createLinearGradient(W/2-250,0,W/2+250,0);
  tg.addColorStop(0,'#4FC3F7');tg.addColorStop(0.5,'#FFF');tg.addColorStop(1,'#4FC3F7');
  ctx.fillStyle=tg;ctx.fillText('HUNGRY ABYSS',W/2,H*0.07);
  ctx.shadowBlur=0;ctx.font=`bold ${Math.round(H*0.022)}px Segoe UI`;ctx.fillStyle='rgba(180,220,255,0.82)';
  ctx.fillText('MONSTERS & METROPOLIS',W/2,H*0.1);
  ctx.restore();

  // Altın & divider
  ctx.save();ctx.textAlign='center';
  ctx.shadowBlur=10;ctx.shadowColor='#FFD700';
  ctx.font=`bold ${Math.round(H*0.024)}px Segoe UI`;ctx.fillStyle='#FFD700';
  ctx.fillText(`\u{1F4B0} ${gold.toLocaleString()} ALTIN`,W/2,H*0.135);
  ctx.shadowBlur=0;
  let dg=ctx.createLinearGradient(W/2-200,0,W/2+200,0);
  dg.addColorStop(0,'rgba(79,195,247,0)');dg.addColorStop(0.5,'rgba(79,195,247,0.65)');dg.addColorStop(1,'rgba(79,195,247,0)');
  ctx.strokeStyle=dg;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W/2-200,H*0.148);ctx.lineTo(W/2+200,H*0.148);ctx.stroke();
  ctx.restore();

  // ── CAROUSEL ALANI ─────────────────────────────────────────
  let sh=SHARKS[menuIdx],unlocked=getUnlocked(),isUnlocked=unlocked.includes(sh.id);
  let preX=W/2,preY=H*0.42,preR=Math.min(H*0.22,160);

  // Önizleme arka parlaklık
  ctx.save();
  let glow=ctx.createRadialGradient(preX,preY,0,preX,preY,preR*1.1);
  glow.addColorStop(0,`${sh.color}22`);glow.addColorStop(0.6,`${sh.color}11`);glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(preX,preY,preR*1.1,0,Math.PI*2);ctx.fill();
  // Oval çerçeve
  ctx.strokeStyle=`${sh.top}88`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(preX,preY,preR*1.05,preR*0.72,0,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Yüzme animasyonu
  let swimAng=Math.sin(now/1400)*0.1;
  let bobY=Math.sin(now/900)*12;
  let prevSz=Math.min(preR*0.72,60);
  drawShark(preX,preY+bobY,prevSz,swimAng,sh.color,sh.top,'shark',false,sh.id);

  // ── SOL/SAĞ OK ─────────────────────────────────────────────
  let arY=preY,arLx=preX-preR*1.42,arRx=preX+preR*1.42;

  // Sol ok
  ctx.save();
  ctx.globalAlpha=0.85;
  ctx.fillStyle='rgba(0,30,80,0.75)';ctx.strokeStyle='rgba(79,195,247,0.8)';ctx.lineWidth=1.5;
  let arW=44,arH=52;
  _rrect(arLx-arW/2,arY-arH/2,arW,arH,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#FFF';ctx.font=`bold ${Math.round(arH*0.52)}px Segoe UI`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('<',arLx,arY);
  ctx.restore();
  menuHA.left={x:arLx-arW/2,y:arY-arH/2,w:arW,h:arH};

  // Sağ ok
  ctx.save();ctx.globalAlpha=0.85;
  ctx.fillStyle='rgba(0,30,80,0.75)';ctx.strokeStyle='rgba(79,195,247,0.8)';ctx.lineWidth=1.5;
  _rrect(arRx-arW/2,arY-arH/2,arW,arH,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#FFF';ctx.font=`bold ${Math.round(arH*0.52)}px Segoe UI`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('>',arRx,arY);
  ctx.restore();
  menuHA.right={x:arRx-arW/2,y:arY-arH/2,w:arW,h:arH};

  // ── NAVİGASYON NOKTALARI ────────────────────────────────────
  ctx.save();ctx.textBaseline='alphabetic';
  for(let d=0;d<SHARKS.length;d++){
    ctx.fillStyle=d===menuIdx?'#4FC3F7':'rgba(255,255,255,0.25)';
    ctx.beginPath();ctx.arc(W/2+(d-3.5)*14,H*0.65,d===menuIdx?4:3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // ── KARAKTERİ BILGISI ──────────────────────────────────────
  ctx.save();ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.font=`bold ${Math.round(H*0.034)}px Segoe UI`;ctx.fillStyle='#FFF';
  ctx.fillText(sh.name,W/2,H*0.68);
  ctx.font=`${Math.round(H*0.018)}px Segoe UI`;ctx.fillStyle='rgba(180,210,240,0.85)';
  ctx.fillText(sh.desc,W/2,H*0.705);

  // Stat barları
  let bw=Math.min(W*0.35,240),bh=8,bx=W/2-bw/2,bsp=22;
  [['HIZ',sh.speed/10,'#29B6F6'],['ISIRI',sh.bite/10,'#EF5350'],['CAN',sh.hp/600,'#66BB6A']].forEach(([lbl,pct,clr],ki)=>{
    let by=H*0.725+ki*bsp;
    ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=clr;ctx.fillRect(bx,by,bw*Math.min(pct,1),bh);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font=`${Math.round(H*0.016)}px Segoe UI`;ctx.textAlign='left';
    ctx.fillText(lbl,bx-50,by+bh-1);
  });
  ctx.restore();

  // ── OYNA / SATIN AL BUTONU ──────────────────────────────────
  let btnW=220,btnH=46,btnX=W/2-btnW/2,btnY=H*0.805;
  let canAfford=gold>=sh.price;
  ctx.save();
  let pulse=Math.sin(now/500)*0.08;
  ctx.globalAlpha=0.9+pulse;
  ctx.fillStyle=isUnlocked?'rgba(46,125,50,0.9)':canAfford?'rgba(25,80,180,0.9)':'rgba(50,50,60,0.8)';
  ctx.strokeStyle=isUnlocked?'#81C784':canAfford?'#64B5F6':'#555';ctx.lineWidth=1.5;
  _rrect(btnX,btnY,btnW,btnH,12);ctx.fill();ctx.stroke();
  ctx.globalAlpha=1;
  ctx.font=`bold ${Math.round(H*0.025)}px Segoe UI`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#FFF';
  let btnTxt=isUnlocked?'\u{25B6} OYNA':canAfford?`\u{1F6D2} ${sh.price.toLocaleString()} ALTIN`:`\u{1F512} ${sh.price.toLocaleString()} ALTIN`;
  ctx.fillText(btnTxt,W/2,btnY+btnH/2);
  ctx.restore();
  menuHA.play={x:btnX,y:btnY,w:btnW,h:btnH};

  // ── GÜNLÜK ÖDÜL ─────────────────────────────────────────────
  let claim=Date.now()-lastClaim>=86400000;
  ctx.save();
  ctx.fillStyle=claim?'rgba(46,125,50,0.88)':'rgba(70,70,80,0.75)';
  ctx.strokeStyle=claim?'#81C784':'#555';ctx.lineWidth=1;
  _rrect(W-238,16,220,46,10);ctx.fill();ctx.stroke();
  ctx.font=`bold ${Math.round(H*0.018)}px Segoe UI`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#FFF';
  ctx.fillText(claim?'\u{1F381} GÜNLÜK ÖDÜL (+2500)':'\u{23F1} ÖDÜL ALINDI',W-128,39);
  ctx.restore();
  menuHA.daily={x:W-238,y:16,w:220,h:46};
}

// ═══════════════════════════════════════════════════════════════
//  OYUN ÇİZİMİ
// ═══════════════════════════════════════════════════════════════
function drawGame(){
  let pY=player.y;
  if(pY<SL){
    let sk=ctx.createLinearGradient(0,0,0,canvas.height);
    sk.addColorStop(0,'#2C3E50');sk.addColorStop(1,'#A9DFBF');
    ctx.fillStyle=sk;ctx.fillRect(0,0,canvas.width,canvas.height);
  } else {
    let df=Math.min(1,(pY-SL)/(WH-SL));
    ctx.fillStyle=lerpColor('#1A5276','#010A15',df);
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  drawLightRays();drawWave();
  let sLy=SL-cam.y;
  ctx.fillStyle='rgba(20,80,160,0.25)';ctx.fillRect(0,sLy,canvas.width,WH);
  let lx1=1800-cam.x,lx2=5200-cam.x;
  if(lx2>=0&&lx1<=canvas.width){
    ctx.fillStyle='#2C3E50';ctx.fillRect(lx1,SL-40-cam.y,lx2-lx1,600);
    ctx.fillStyle='#1C2833';
    for(let b=0;b<12;b++){
      let bw=140,bh=250+(b%3*90),bx=2000+(b*240)-cam.x;
      ctx.fillRect(bx,SL-40-bh-cam.y,bw,bh);
      ctx.fillStyle='#F4D03F';
      for(let w=0;w<3;w++) for(let h=0;h<5;h++) ctx.fillRect(bx+20+w*35,SL-20-bh+h*40-cam.y,15,15);
      ctx.fillStyle='#1C2833';
    }
  }
  drawBubbles();
  fish.forEach(f=>{
    let sx=f.x-cam.x,sy=f.y-cam.y;
    if(sx>=-60&&sx<=canvas.width+60&&sy>=-60&&sy<=canvas.height+60)
      drawShark(sx,sy,f.sz,f.ang,f.c,f.c,f.t,false,-1);
  });
  levs.forEach(lv=>drawLev(lv));
  drawShark(player.x-cam.x,player.y-cam.y,player.sz,player.ang,player.color,player.top,'shark',true,player.id);
  if(player.id===7&&player.aFire){
    let bx=player.x+Math.cos(player.ang)*player.sz-cam.x;
    let by=player.y+Math.sin(player.ang)*(player.walk?-40:0)-cam.y;
    ctx.save();ctx.strokeStyle='#00E5FF';ctx.lineWidth=24;ctx.shadowBlur=30;ctx.shadowColor='#00E5FF';
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(player.ang)*900,by+Math.sin(player.ang)*900);ctx.stroke();ctx.restore();
  }
  // HUD
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(20,20,220,22);
  let hp=Math.max(0,player.health/player.hp);
  ctx.fillStyle=hp>0.3?'#2ECC71':'#E74C3C';ctx.fillRect(20,20,220*hp,22);
  ctx.strokeStyle='#FFF';ctx.strokeRect(20,20,220,22);
  ctx.fillStyle='#FFF';ctx.font='bold 14px Segoe UI';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText(`\u{1F4B0} ${gold}`,20,66);
  ctx.fillText(`\u{2693} ${Math.floor((player.y-SL)/6)}m`,20,88);
  if(player.id===7){
    ctx.fillStyle=player.aCool<=0?'#00E5FF':'#BDC3C7';
    ctx.fillText(`\u{1F525} ATOMİK (V): ${player.aCool<=0?'HAZIR':Math.ceil(player.aCool/60)+'s'}`,20,112);
  }
  if(state==='GAMEOVER'){
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#E74C3C';ctx.font='bold 40px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('CANAVAR AÇLIKTAN ÖLDÜ!',canvas.width/2,canvas.height/2-20);
    ctx.fillStyle='#FFF';ctx.font='16px Segoe UI';
    ctx.fillText('Altınlar kaydedildi. Menüye dönmek için tıkla.',canvas.width/2,canvas.height/2+20);
  }
}

// ── ANA ÇİZİM ────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.textBaseline='alphabetic';
  if(state==='MENU') drawMenu();
  else drawGame();
}

// ── YARDIMCI FONKSİYONLAR ────────────────────────────────────────────────────
function lerpColor(c1,c2,f){
  let a=parseInt(c1.slice(1),16),b=parseInt(c2.slice(1),16);
  let r1=(a>>16)&255,g1=(a>>8)&255,b1=a&255;
  let r2=(b>>16)&255,g2=(b>>8)&255,b2=b&255;
  return '#'+((1<<24)+(Math.round(r1+f*(r2-r1))<<16)+(Math.round(g1+f*(g2-g1))<<8)+Math.round(b1+f*(b2-b1))).toString(16).slice(1);
}

function _rrect(x,y,w,h,r){
  if(w<2*r)r=w/2;if(h<2*r)r=h/2;
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){_rrect(x,y,w,h,r);return this;};
}

// ── OYUN DÖNGÜSÜ ─────────────────────────────────────────────────────────────

// ── HİLE KODU ─────────────────────────────────────────────────────────────
let _cb='',_cDone=false,_cMsg='',_cMsgT=0;
window.addEventListener('keydown',function(ev){
  _cb=(_cb+ev.key).slice(-6);
  if(_cb.toUpperCase()==='H5B9L4'&&!_cDone){
    _cDone=true;gold=999999;
    let ul=getUnlocked();
    SHARKS.forEach(function(sh){if(!ul.includes(sh.id))ul.push(sh.id);});
    saveUnlocked(ul);save();
    _cMsg='HILE H5B9L4 - TUM KARAKTERLER ACILDI!';_cMsgT=260;
  }
});
function drawCheatUI(){
  let bx=10,by=128,bw=130,bh=30;
  if(!window._cheatBtnArea) window._cheatBtnArea={x:bx,y:by,w:bw,h:bh};
  else{window._cheatBtnArea.x=bx;window._cheatBtnArea.y=by;window._cheatBtnArea.w=bw;window._cheatBtnArea.h=bh;}
  ctx.save();
  // Buton arka plan
  ctx.fillStyle=_cDone?'rgba(160,120,0,0.88)':'rgba(20,18,50,0.82)';
  ctx.strokeStyle=_cDone?'#FFD700':'rgba(80,80,160,0.9)';
  ctx.lineWidth=1.5;
  _rrect(bx,by,bw,bh,8);ctx.fill();ctx.stroke();
  // Buton yazisi
  ctx.font='bold 12px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=_cDone?'#FFD700':'rgba(200,200,240,0.95)';
  ctx.globalAlpha=1;
  ctx.fillText(_cDone?'\uD83D\uDD13 HiLE AKTiF':'\uD83D\uDD12 HiLE KODU',bx+bw/2,by+bh/2);
  // Aktivasyon mesaji
  if(_cMsgT>0){
    _cMsgT--;
    ctx.globalAlpha=Math.min(1,_cMsgT/30);
    ctx.font='bold 20px Segoe UI';ctx.fillStyle='#FFD700';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowBlur=16;ctx.shadowColor='#FFD700';
    ctx.fillText(_cMsg,canvas.width/2,canvas.height/2-80);
    ctx.shadowBlur=0;
  }
  ctx.restore();
}


// Hile butonu click
window.addEventListener('click',function(e){
  let btn=window._cheatBtnArea;
  if(!btn) return;
  if(e.clientX>=btn.x&&e.clientX<=btn.x+btn.w&&e.clientY>=btn.y&&e.clientY<=btn.y+btn.h){
    if(_cDone){alert('Hile zaten aktif! 999.999 altin ve tum karakterler acik.');return;}
    let code=prompt('Hile Kodunu Girin:','');
    if(code===null) return;
    if(code.toUpperCase()==='H5B9L4'){
      _cDone=true;gold=999999;
      let ul=getUnlocked();
      SHARKS.forEach(function(sh){if(!ul.includes(sh.id))ul.push(sh.id);});
      saveUnlocked(ul);save();
      _cMsg='HILE H5B9L4 - TUM KARAKTERLER ACILDI!';_cMsgT=260;
      alert('Hile aktif! 999.999 altin ve tum karakterler acildi!');
    } else {
      alert('Yanlis kod!');
    }
  }
});

setInterval(()=>{update();draw();drawCheatUI();},1000/60);
</script>
