<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIOyunLab - Yapay Zeka Oyun Laboratuvarı</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  
  <style>
    body { 
      font-family: 'Space Grotesk', system-ui, sans-serif; 
      scroll-behavior: smooth;
    }
    
    /* Özelleştirilmiş Kaydırma Çubuğu */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #22d3ee; }

    .hero-bg { 
      background: linear-gradient(135deg, #020617 0%, #0f172a 100%); 
    }
    
    /* Cam Efekti (Glassmorphism) */
    .glass {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(34, 211, 238, 0.1);
    }

    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Oyun Kartı Geliştirmeleri */
    .game-card { 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      position: relative;
    }
    
    .game-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 1.5rem;
      border: 2px solid transparent;
      background: linear-gradient(45deg, #22d3ee, #9333ea) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .game-card:hover::after { opacity: 1; }
    
    .game-card:hover { 
      transform: translateY(-12px) scale(1.02); 
      box-shadow: 0 20px 40px -10px rgba(34, 211, 238, 0.3); 
    }

    .neon-text { 
      text-shadow: 0 0 10px rgba(34, 211, 238, 0.6), 0 0 20px rgba(34, 211, 238, 0.4); 
    }

    /* Süzülme Animasyonu */
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    /* Buton Parlama Animasyonu */
    .btn-glow {
      position: relative;
      overflow: hidden;
    }
    .btn-glow::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.5s;
    }
    .btn-glow:hover::before {
      left: 100%;
      transition: 0.5s;
    }

    /* Particles Container */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200">

  <nav class="glass sticky top-0 z-50 transition-all">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-xl flex items-center justify-center text-2xl font-bold shadow-[0_0_15px_rgba(34,211,238,0.5)]">🤖</div>
        <h1 class="text-3xl font-bold tracking-tight neon-text">AIOyunLab</h1>
      </div>
      
      <div class="flex items-center gap-6">
        <button onclick="openAdmin()" 
                class="bg-slate-800/80 hover:bg-cyan-500 hover:text-slate-950 transition-all duration-300 px-5 py-2.5 rounded-2xl flex items-center gap-2 text-sm font-semibold border border-slate-700 hover:border-cyan-500 shadow-lg">
          <i class="fas fa-lock"></i> Admin Panel
        </button>
      </div>
    </div>
  </nav>

  <section class="hero-bg min-h-screen flex items-center relative overflow-hidden">
    <div id="particles-js"></div>
    
    <div class="absolute inset-0 bg-[radial-gradient(at_center,#22d3ee_0%,transparent_60%)] opacity-20 z-0"></div>
    
    <div class="max-w-7xl mx-auto px-6 py-24 text-center relative z-10 floating">
      <div class="inline-block mb-4 px-4 py-1.5 rounded-full border border-cyan-500/30 bg-cyan-500/10 text-cyan-400 font-semibold text-sm backdrop-blur-sm">
        <i class="fas fa-code mr-2"></i>Yeni Nesil HTML Oyun Merkezi
      </div>
      <h2 class="text-6xl md:text-8xl font-bold mb-6 leading-tight tracking-tight">
        Yapay Zeka ile<br>Üretilen <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 neon-text">Oyunlar</span>
      </h2>
      <p class="text-xl md:text-2xl text-slate-400 mb-10 max-w-2xl mx-auto font-light">
        AI ile geliştirdiğin tüm HTML oyunlarını burada topla, test et ve dünyayla paylaş.
      </p>
      
      <div class="flex flex-col sm:flex-row gap-5 justify-center items-center">
        <a href="#oyunlar" class="btn-glow bg-white text-black text-lg font-bold px-10 py-4 rounded-full hover:scale-105 transition-transform shadow-[0_0_20px_rgba(255,255,255,0.3)]">
          <i class="fas fa-gamepad mr-2"></i> Oyunları Keşfet
        </a>
        <button onclick="openAdmin()" class="btn-glow border-2 border-cyan-500/50 text-cyan-400 text-lg font-bold px-10 py-4 rounded-full hover:bg-cyan-500/10 hover:border-cyan-400 transition-all backdrop-blur-sm">
          Yönetici Paneli
        </button>
      </div>
    </div>
  </section>

  <section id="oyunlar" class="max-w-7xl mx-auto px-6 py-24 relative z-10">
    <div class="text-center mb-16">
      <h2 class="text-5xl font-bold mb-4">Oyun <span class="text-cyan-400">Laboratuvarı</span></h2>
      <div class="w-24 h-1 bg-gradient-to-r from-cyan-400 to-purple-500 mx-auto rounded-full mb-6"></div>
      <p class="text-slate-400 text-xl font-light">Sistemde yüklü olan yapay zeka harikaları</p>
    </div>
    
    <div id="games-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      </div>
  </section>

  <div id="adminModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 transition-opacity">
    <div class="glass-card rounded-3xl p-8 w-full max-w-lg border border-cyan-500/20 shadow-[0_0_50px_rgba(34,211,238,0.15)] relative overflow-hidden">
      <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
      <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

      <div class="relative z-10">
        <h2 class="text-3xl font-bold mb-8 text-center flex items-center justify-center gap-3">
          <i class="fas fa-user-shield text-cyan-400"></i> Sistem Erişimi
        </h2>
        
        <div id="loginScreen">
          <div class="relative mb-6">
            <i class="fas fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
            <input type="password" id="adminPass" placeholder="Yönetici şifresini girin..." 
                   class="w-full bg-slate-900/80 border border-slate-700 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none p-4 pl-12 rounded-2xl text-lg transition-all">
          </div>
          <button onclick="loginAdmin()" 
                  class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-slate-950 font-bold py-4 rounded-2xl shadow-lg transform transition hover:-translate-y-1">
            Giriş Yap <i class="fas fa-arrow-right ml-2"></i>
          </button>
        </div>

        <div id="adminPanel" class="hidden">
          <div class="space-y-5">
            <h3 class="text-xl font-semibold text-cyan-400 flex items-center gap-2"><i class="fas fa-plus-circle"></i> Yeni Oyun Ekle</h3>
            <input id="gameName" type="text" placeholder="Oyun Adı" class="w-full bg-slate-900/80 border border-slate-700 focus:border-cyan-400 outline-none p-4 rounded-2xl transition-all">
            <input id="gameDesc" type="text" placeholder="Kısa Açıklama" class="w-full bg-slate-900/80 border border-slate-700 focus:border-cyan-400 outline-none p-4 rounded-2xl transition-all">
            <input id="gameFile" type="text" placeholder="HTML Linki (örnek: oyun.html)" class="w-full bg-slate-900/80 border border-slate-700 focus:border-cyan-400 outline-none p-4 rounded-2xl transition-all">
            <input id="gameEmoji" type="text" placeholder="Emoji (örnek: 🚀)" class="w-full bg-slate-900/80 border border-slate-700 focus:border-cyan-400 outline-none p-4 rounded-2xl transition-all">
            
            <button onclick="addGameFromAdmin()" 
                    class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-slate-950 font-bold py-4 rounded-2xl shadow-lg transform transition hover:-translate-y-1">
              <i class="fas fa-upload mr-2"></i> Sisteme Yükle
            </button>

            <hr class="border-slate-700/50 my-6">
            <h3 class="text-xl font-semibold text-purple-400 flex items-center gap-2"><i class="fas fa-database"></i> Veritabanı</h3>
            <div id="adminGameList" class="max-h-48 overflow-auto space-y-2 pr-2"></div>

            <button onclick="logoutAdmin()" 
                    class="w-full bg-slate-800 hover:bg-red-500/20 text-red-400 hover:text-red-300 border border-slate-700 hover:border-red-500/50 py-3 rounded-2xl transition-all mt-4 font-semibold">
              <i class="fas fa-sign-out-alt mr-2"></i> Çıkış Yap
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ŞİFREN GÜNCELLENDİ
    const ADMIN_PASSWORD = "kP9$vX!2mZ#qL8";

    let games = JSON.parse(localStorage.getItem('aioyunlab_games')) || [];

    function renderGames() {
      const grid = document.getElementById('games-grid');
      grid.innerHTML = '';

      if (games.length === 0) {
        grid.innerHTML = `
          <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-20">
            <div class="w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner">
              <i class="fas fa-ghost text-slate-600"></i>
            </div>
            <p class="text-slate-400 text-lg">Laboratuvar şu an boş.<br>Admin panelden ilk şaheserini ekle.</p>
          </div>`;
        return;
      }

      games.forEach((game, index) => {
        const card = document.createElement('div');
        // Kartın tasarımı inanılmaz hale getirildi (Kod yapısı bozulmadan)
        card.className = 'game-card bg-slate-900 border border-slate-700 rounded-3xl overflow-hidden shadow-lg';
        card.innerHTML = `
          <div class="h-48 bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center text-7xl relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent z-10"></div>
            <div class="absolute w-32 h-32 bg-cyan-500/20 rounded-full blur-3xl group-hover:bg-cyan-400/30 transition-colors"></div>
            <span class="relative z-20 transform group-hover:scale-110 transition-transform duration-500 drop-shadow-2xl">${game.emoji || '🎮'}</span>
          </div>
          <div class="p-8 relative z-20 bg-slate-900">
            <h3 class="text-2xl font-bold mb-3 text-white group-hover:text-cyan-400 transition-colors">${game.name}</h3>
            <p class="text-slate-400 mb-8 line-clamp-3 font-light text-sm leading-relaxed">${game.desc}</p>
            <a href="${game.file}" target="_blank"
               class="btn-glow block w-full text-center bg-slate-800 hover:bg-cyan-500 text-cyan-400 hover:text-slate-950 font-bold py-4 rounded-2xl border border-slate-700 hover:border-cyan-500 transition-all shadow-md">
              <i class="fas fa-play mr-2"></i> Başlat
            </a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function addGameFromAdmin() {
      const name = document.getElementById('gameName').value.trim();
      const desc = document.getElementById('gameDesc').value.trim();
      const file = document.getElementById('gameFile').value.trim();
      const emoji = document.getElementById('gameEmoji').value.trim();

      if (!name || !file) {
        alert("Oyun adı ve dosya linki zorunludur!");
        return;
      }

      games.push({ name, desc, file, emoji });
      localStorage.setItem('aioyunlab_games', JSON.stringify(games));
      renderGames();
      renderAdminGameList();

      document.getElementById('gameName').value = '';
      document.getElementById('gameDesc').value = '';
      document.getElementById('gameFile').value = '';
      document.getElementById('gameEmoji').value = '';
    }

    function renderAdminGameList() {
      const list = document.getElementById('adminGameList');
      list.innerHTML = '';
      games.forEach((game, i) => {
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center bg-slate-900/80 border border-slate-700 p-4 rounded-2xl hover:border-slate-500 transition-colors';
        div.innerHTML = `
          <div class="flex items-center gap-3">
            <span class="text-2xl">${game.emoji || '🎮'}</span>
            <span class="font-semibold text-slate-200">${game.name}</span>
          </div>
          <button onclick="deleteGame(${i})" class="w-10 h-10 rounded-full bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center">
            <i class="fas fa-trash"></i>
          </button>
        `;
        list.appendChild(div);
      });
    }

    function deleteGame(index) {
      if (confirm("Bu oyunu veritabanından silmek istediğine emin misin?")) {
        games.splice(index, 1);
        localStorage.setItem('aioyunlab_games', JSON.stringify(games));
        renderGames();
        renderAdminGameList();
      }
    }

    function openAdmin() {
      document.getElementById('adminModal').classList.remove('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('adminPanel').classList.add('hidden');
      document.getElementById('adminPass').focus();
    }

    function loginAdmin() {
      const pass = document.getElementById('adminPass').value;
      if (pass === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        renderAdminGameList();
      } else {
        // Hatalı şifre animasyonu için basit bir class ekleyip çıkarma
        const input = document.getElementById('adminPass');
        input.classList.add('border-red-500', 'animate-pulse');
        setTimeout(() => input.classList.remove('border-red-500', 'animate-pulse'), 1000);
      }
    }

    function logoutAdmin() {
      document.getElementById('adminModal').classList.add('hidden');
      document.getElementById('adminPass').value = '';
    }

    // İlk yükleme
    renderGames();

    // Arka Plan Parçacık (Particles) Konfigürasyonu
    particlesJS('particles-js', {
      "particles": {
        "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#22d3ee" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.3, "random": false },
        "size": { "value": 3, "random": true },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#22d3ee",
          "opacity": 0.2,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 2,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false,
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "grab" },
          "onclick": { "enable": true, "mode": "push" },
          "resize": true
        },
        "modes": {
          "grab": { "distance": 140, "line_linked": { "opacity": 0.8 } },
          "push": { "particles_nb": 4 }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
